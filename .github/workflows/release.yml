name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish.
        required: true
        default: latest

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Check CLI
        run: npm run check

      - name: Verify npm package
        run: npm run pack:dry-run

      - name: Smoke test installed package
        run: npm run pack:smoke

      - name: Smoke test example delivery
        run: npm run example:smoke

      - name: Optional live provider smoke
        run: npm run smoke:live

      - name: Check npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN repository secret is required to publish dev-flow-ai." >&2
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ github.event.inputs.npm_tag || 'latest' }}
        run: npm publish --provenance --access public --tag "$NPM_TAG"
