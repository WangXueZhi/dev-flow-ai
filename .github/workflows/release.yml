name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish.
        required: true
        default: latest
      require_live_smoke:
        description: Require a real provider smoke before publishing from manual dispatch.
        required: true
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    env:
      DEVFLOW_LIVE_SMOKE_REPORT: .devflow/artifacts/live-provider-smoke.json

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Check release readiness
        run: npm run release:readiness

      - name: Check CLI
        run: npm run check

      - name: Verify npm package
        run: npm run pack:dry-run

      - name: Smoke test installed package
        run: npm run pack:smoke

      - name: Smoke test GitHub install path
        env:
          DEVFLOW_GITHUB_SPEC: github:WangXueZhi/dev-flow-ai#${{ github.ref_name }}
        run: npm run github:smoke

      - name: Smoke test example delivery
        run: npm run example:smoke

      - name: Smoke test example visual delivery
        run: npm run example:visual-smoke

      - name: Optional live provider smoke
        if: ${{ github.event_name != 'release' && github.event.inputs.require_live_smoke != 'true' }}
        env:
          DEVFLOW_AI_API_KEY: ${{ secrets.DEVFLOW_AI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run smoke:live

      - name: Required live provider smoke
        if: ${{ github.event_name == 'release' || github.event.inputs.require_live_smoke == 'true' }}
        env:
          DEVFLOW_REQUIRE_LIVE_SMOKE: "true"
          DEVFLOW_AI_API_KEY: ${{ secrets.DEVFLOW_AI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run smoke:live

      - name: Verify optional live provider smoke report
        if: ${{ github.event_name != 'release' && github.event.inputs.require_live_smoke != 'true' }}
        run: npm run smoke:live:report

      - name: Verify required live provider smoke report
        if: ${{ github.event_name == 'release' || github.event.inputs.require_live_smoke == 'true' }}
        run: npm run smoke:live:report -- --require-passed

      - name: Summarize live provider smoke report
        if: ${{ always() }}
        run: npm run smoke:live:summary

      - name: Upload live provider smoke report
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: live-provider-smoke-report
          path: .devflow/artifacts/live-provider-smoke.json
          if-no-files-found: warn
          retention-days: 30

      - name: Check npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN repository secret is required to publish dev-flow-ai." >&2
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ github.event.inputs.npm_tag || 'latest' }}
        run: npm publish --provenance --access public --tag "$NPM_TAG"
