name: DevFlow Delivery
description: Run DevFlow in a frontend repository to turn requirements, UI notes, and API docs into delivery artifacts.

inputs:
  version:
    description: npm version, dist-tag, or package spec of the dev-flow-ai package to run.
    required: false
    default: github:WangXueZhi/dev-flow-ai#main
  working-directory:
    description: Repository subdirectory where DevFlow should run.
    required: false
    default: .
  requirements:
    description: Path to the requirements document.
    required: false
    default: docs/requirements.md
  ui:
    description: Path to the UI notes or design handoff document.
    required: false
    default: docs/ui.md
  api:
    description: Path to the API documentation.
    required: false
    default: docs/api.md
  task:
    description: Optional DevFlow task id to target.
    required: false
    default: ""
  unit:
    description: Optional implementation unit id to target.
    required: false
    default: ""
  preview-url:
    description: Optional preview URL for visual checks.
    required: false
    default: ""
  visual-text:
    description: Optional comma-separated text checks for the preview URL.
    required: false
    default: ""
  viewport:
    description: Optional viewport specs, for example desktop:1440x1000,tablet:900x1100.
    required: false
    default: ""
  verify-command:
    description: Optional verification command override.
    required: false
    default: ""
  install-chromium:
    description: Install Playwright Chromium before running visual checks.
    required: false
    default: "false"
  apply:
    description: Run source-changing delivery. Requires confirm-apply=true.
    required: false
    default: "false"
  confirm-apply:
    description: Explicit confirmation that source-changing delivery may modify files.
    required: false
    default: "false"
  require-clean:
    description: Require a clean git working tree outside the DevFlow artifact directory before source-changing apply.
    required: false
    default: "false"
  patch-set:
    description: Optional reviewed patch-set JSON path for source-changing delivery.
    required: false
    default: ""
  save-patch-set:
    description: Optional path for saving AI-generated patch sets.
    required: false
    default: ""
  source-context:
    description: Include bounded repository source snippets in AI prompts. Set to false to omit source snippets.
    required: false
    default: "true"
  upload-artifacts:
    description: Upload DevFlow artifacts with actions/upload-artifact after delivery.
    required: false
    default: "false"
  artifact-name:
    description: Artifact name to use when upload-artifacts=true.
    required: false
    default: devflow-artifacts
  artifacts-path:
    description: Path to DevFlow artifacts, relative to working-directory.
    required: false
    default: .devflow/artifacts
  job-summary:
    description: Write a DevFlow delivery summary to the GitHub Actions job summary.
    required: false
    default: "true"
  fail-on-attention:
    description: Fail the action when the delivery manifest readiness is not ready for review.
    required: false
    default: "false"
  fail-on-failed-verification:
    description: Fail the action when the delivery manifest verification status is failed.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Playwright Chromium
      if: ${{ inputs.install-chromium == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npx --yes playwright install chromium

    - name: Run DevFlow delivery
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        DEVFLOW_VERSION: ${{ inputs.version }}
        REQUIREMENTS_PATH: ${{ inputs.requirements }}
        UI_PATH: ${{ inputs.ui }}
        API_PATH: ${{ inputs.api }}
        TASK_ID: ${{ inputs.task }}
        UNIT_ID: ${{ inputs.unit }}
        PREVIEW_URL: ${{ inputs.preview-url }}
        VISUAL_TEXT: ${{ inputs.visual-text }}
        VIEWPORT: ${{ inputs.viewport }}
        VERIFY_COMMAND: ${{ inputs.verify-command }}
        APPLY: ${{ inputs.apply }}
        CONFIRM_APPLY: ${{ inputs.confirm-apply }}
        REQUIRE_CLEAN: ${{ inputs.require-clean }}
        PATCH_SET: ${{ inputs.patch-set }}
        SAVE_PATCH_SET: ${{ inputs.save-patch-set }}
        SOURCE_CONTEXT: ${{ inputs.source-context }}
      run: |
        set -euo pipefail

        if [[ "$APPLY" == "true" && "$CONFIRM_APPLY" != "true" ]]; then
          echo "DevFlow source-changing delivery requires confirm-apply=true." >&2
          exit 1
        fi

        args=(deliver)
        [[ -n "$REQUIREMENTS_PATH" ]] && args+=(--requirements "$REQUIREMENTS_PATH")
        [[ -n "$UI_PATH" ]] && args+=(--ui "$UI_PATH")
        [[ -n "$API_PATH" ]] && args+=(--api "$API_PATH")
        [[ -n "$TASK_ID" ]] && args+=(--task "$TASK_ID")
        [[ -n "$UNIT_ID" ]] && args+=(--unit "$UNIT_ID")
        [[ -n "$PREVIEW_URL" ]] && args+=(--preview-url "$PREVIEW_URL")
        [[ -n "$VISUAL_TEXT" ]] && args+=(--visual-text "$VISUAL_TEXT")
        [[ -n "$VIEWPORT" ]] && args+=(--viewport "$VIEWPORT")
        [[ -n "$VERIFY_COMMAND" ]] && args+=(--command "$VERIFY_COMMAND")
        [[ -n "$PATCH_SET" ]] && args+=(--patch-set "$PATCH_SET")
        [[ -n "$SAVE_PATCH_SET" ]] && args+=(--save-patch-set "$SAVE_PATCH_SET")
        if [[ "${REQUIRE_CLEAN,,}" == "true" ]]; then
          args+=(--require-clean)
        fi
        if [[ "${SOURCE_CONTEXT,,}" == "false" ]]; then
          args+=(--no-source-context)
        fi

        if [[ "$APPLY" == "true" ]]; then
          args+=(--apply --yes)
        fi

        package_spec="$DEVFLOW_VERSION"
        case "$package_spec" in
          dev-flow-ai|dev-flow-ai@*|*:*|*/*|*.tgz) ;;
          *) package_spec="dev-flow-ai@$package_spec" ;;
        esac

        if [[ -n "$PATCH_SET" ]]; then
          npx --yes --package "$package_spec" dev-flow execute --validate --patch-set "$PATCH_SET"
        fi

        npx --yes --package "$package_spec" dev-flow "${args[@]}"

    - name: Summarize DevFlow delivery
      if: ${{ inputs.job-summary == 'true' && always() }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        MANIFEST_PATH: ${{ inputs.artifacts-path }}/delivery-manifest.json
      run: |
        set -euo pipefail

        node "$GITHUB_ACTION_PATH/scripts/summarize-manifest.mjs"

    - name: Upload DevFlow artifacts
      if: ${{ inputs.upload-artifacts == 'true' && always() }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.working-directory }}/${{ inputs.artifacts-path }}
        if-no-files-found: warn

    - name: Gate DevFlow delivery status
      if: ${{ (inputs.fail-on-attention == 'true' || inputs.fail-on-failed-verification == 'true') && always() }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        DEVFLOW_VERSION: ${{ inputs.version }}
        STATUS_MANIFEST_PATH: ${{ inputs.artifacts-path }}/delivery-manifest.json
        FAIL_ON_ATTENTION: ${{ inputs.fail-on-attention }}
        FAIL_ON_FAILED_VERIFICATION: ${{ inputs.fail-on-failed-verification }}
      run: |
        set -euo pipefail

        args=(status --manifest "$STATUS_MANIFEST_PATH")
        [[ "$FAIL_ON_ATTENTION" == "true" ]] && args+=(--fail-on-attention)
        [[ "$FAIL_ON_FAILED_VERIFICATION" == "true" ]] && args+=(--fail-on-failed-verification)

        package_spec="$DEVFLOW_VERSION"
        case "$package_spec" in
          dev-flow-ai|dev-flow-ai@*|*:*|*/*|*.tgz) ;;
          *) package_spec="dev-flow-ai@$package_spec" ;;
        esac

        npx --yes --package "$package_spec" dev-flow "${args[@]}"
